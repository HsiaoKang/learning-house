# 发布构建：打包各平台安装包并上传到对应 tag 的 GitHub Release
# 触发方式：release-please 级联调用（常规路径）/ 手动推 v* 标签（兜底）
# 作者: yuchenxi
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  workflow_call:
    inputs:
      tag_name:
        description: "要构建并上传资产的 tag（如 v0.2.0）"
        type: string
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          # Intel Mac
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          # Windows x64
          - platform: windows-latest
            args: ""
          # Linux x64
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: 安装 Linux 系统依赖（WebKitGTK 等）
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建并上传安装包
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.tag_name || github.ref_name }}
          releaseName: "Learning House ${{ inputs.tag_name || github.ref_name }}"
          releaseBody: "macOS 用户请下载 .dmg（Apple Silicon 选 aarch64，Intel 选 x64）。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
